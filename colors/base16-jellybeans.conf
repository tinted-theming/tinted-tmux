# Base16 Jellybeans
# Scheme author: FredHappyface (https://github.com/fredHappyface), converted to Base16 by https://github.com/nonetrix
# Template author: Tinted Theming: (https://github.com/tinted-theming)

# default statusbar colors
set-option -g status-style "fg=#d5d5d5,bg=#121212"

# default window title colors
set-window-option -g window-status-style "fg=#d5d5d5,bg=#121212"

# active window title colors
set-window-option -g window-status-current-style "fg=#ffdca0,bg=#121212"

# pane border
set-option -g pane-border-style "fg=#929292"
set-option -g pane-active-border-style "fg=#cdcdcd"

# message text
set-option -g message-style "fg=#dedede,bg=#929292"

# pane number display
set-option -g display-panes-active-colour "#cdcdcd"
set-option -g display-panes-colour "#929292"

# clock
set-window-option -g clock-mode-colour "#b1d8f6"

# copy mode highlight
set-window-option -g mode-style "fg=#cdcdcd,bg=#929292"

# bell
set-window-option -g window-status-bell-style "fg=#121212,bg=#ffa1a1"

# style for window titles with activity
set-window-option -g window-status-activity-style "fg=#d5d5d5,bg=#121212"

# style for command messages
set-option -g message-command-style "fg=#dedede,bg=#929292"

# Optional active/inactive pane state
# BASE16_TMUX_OPTION_ACTIVE is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_ACTIVE" = "1" ] || [ "$BASE16_TMUX_OPTION_ACTIVE" = "1" ]' {
  set-window-option -g window-active-style "fg=#d5d5d5,bg=#121212"
  set-window-option -g window-style "fg=#d5d5d5,bg=#121212"
}

# Optional statusbar
# BASE16_TMUX_OPTION_STATUSBAR is a legacy variable
if-shell '[ "$TINTED_TMUX_OPTION_STATUSBAR" = "1" ] || [ "$BASE16_TMUX_OPTION_STATUSBAR" = "1" ]' {
  set-option -g status "on"
  set-option -g status-justify "left"
  set-option -g status-left "#[fg=#d5d5d5,bg=#bdbdbd] #S #[fg=#bdbdbd,bg=#121212,nobold,noitalics,nounderscore]"
  set-option -g status-left-length "80"
  set-option -g status-left-style none
  set-option -g status-right "#[fg=#929292,bg=#121212 nobold, nounderscore, noitalics]#[fg=#cdcdcd,bg=#929292] %Y-%m-%d  %H:%M #[fg=#d5d5d5,bg=#929292,nobold,noitalics,nounderscore]#[fg=#121212,bg=#d5d5d5] #h "
  set-option -g status-right-length "80"
  set-option -g status-right-style none
  set-window-option -g window-status-current-format "#[fg=#121212,bg=#ffdca0,nobold,noitalics,nounderscore]#[fg=#929292,bg=#ffdca0] #I #[fg=#929292,bg=#ffdca0,bold] #W#{?window_zoomed_flag,*Z,} #[fg=#ffdca0,bg=#121212,nobold,noitalics,nounderscore]"
  set-window-option -g window-status-format "#[fg=#121212,bg=#929292,noitalics]#[fg=#dedede,bg=#929292] #I #[fg=#dedede,bg=#929292] #W#{?window_zoomed_flag,*Z,} #[fg=#929292,bg=#121212,noitalics]"
  set-window-option -g window-status-separator ""
}

# vim: set ft=tmux tw=0:
